name: Deploy to Shared Hosting

on:
  push:
    tags:
      - "v*"   # contoh: v1.0.0

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ secrets.NODE_VERSION }}

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build Nuxt in production
      - name: Build Nuxt
        run: npm run build
        env:
          NUXT_MAINTENANCE_ENABLED: true
          NUXT_API_URL: ${{ secrets.NUXT_API_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      # Prepare deploy dir (gabungkan .output + node_modules + package.json)
      - name: Prepare deploy folder
        run: |
          mkdir deploy
          cp -r .output deploy/.output
          # Optimasi: Hapus devDependencies agar node_modules lebih ringan
          npm prune --production
          cp -r node_modules deploy/node_modules
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json

      # Deploy via FTP
      - name: Upload build via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: "deploy/"
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          # Override default ignore agar node_modules tetap di-upload
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            **/node_modules/**/.git*

      # ===== AUTO RESTART NODE.JS APP =====
      - name: Generate restart trigger
        run: |
          mkdir -p restart-tmp
          echo "restart $(date)" > restart-tmp/restart.txt

      - name: Upload restart trigger to FTP (Passenger restart)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          local-dir: "restart-tmp/"
          server-dir: "${{ secrets.FTP_REMOTE_DIR }}/tmp/"
          dangerous-clean-slate: false
